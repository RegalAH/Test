name: Run Python Script

jobs:
  run-python-script:
    runs-on: ubuntu-20.04

    env:
      USER: ${{ secrets.LOGIN }}
      PASS: ${{ secrets.PASSWORD }}

    steps:
    - name: Check out the code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: 3.9

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run Python script
      run: python Test.py
